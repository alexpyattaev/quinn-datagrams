[package]
name = "datagram-bench"
version = "0.1.0"
edition = "2024"

[dependencies]
bytes = "1"
clap = { version = "4", features = ["derive"] }
quinn = "0.12"
rcgen = "0.14"
socket2 = "0.6"
tikv-jemallocator = "0.7"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "time"] }

[patch.crates-io]
quinn = { path = "../quinn/quinn" }
quinn-proto = { path = "../quinn/quinn-proto" }

[profile.release]
debug = 2
